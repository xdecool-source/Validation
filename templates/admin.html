<!DOCTYPE html>
<html>
<head>
    <title>Admin Disponibilités</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4 p-4">
        <h2 class="mb-4">📊 Disponibilités joueurs</h2>
        <div class="mb-3">
            <label>Journée</label>
            <select id="match_day_id" class="form-select"></select>
        </div>
        <button class="btn btn-primary mb-3" onclick="loadDispos()">Afficher</button>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Points</th>
                    <th>Créneau</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<!-- ✅ JS séparé -->
<script src="/static/admin.js"></script>

</body>
</html>
