<!DOCTYPE html>
<html>
<head>
    <title>Import joueurs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width: 200px;">
        <h4 class="text-center mb-3">📥 Import joueurs</h4>
        <form action="/import-joueur" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <input type="file" name="file" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                Importer
            </button>
        </form>
    </div>
</div>
</body>
</html>
