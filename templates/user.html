<!DOCTYPE html>
<html>
<head>
    <title>Disponibilité Ping</title>
    <!-- On amorce -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #404a53 !important; /* gris clair */
        }
    </style>
</head>

<body>
     <!-- Alignement Central -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">🏓 Disponibilité Championnat</h2>

        <form id="form">

            <div class="mb-3" style="max-width: 100px;">
                <label class="form-label">N° de licence</label>
                <input type="text" id="license" class="form-control" required>
            </div>
            <div id="player_name" class="mb-3 fw-bold"></div>
            <div id="player_info" style="margin-top:5px; font-weight:bold;"></div><br>

            <div class="d-flex align-items-end gap-3">

                <!-- Journée -->
                <div style="max-width: 120px;">
                    <label>Journée</label>
                    <select id="match_day_id" class="form-select"></select>
                </div>

                <!-- Date -->
                <div>
                    <label>Date</label>
                    <div id="match_day_date" class="form-control bg-light"></div>
                </div>

            </div>

            <div class="mb-3" style="max-width: 200px;">
                <label class="form-label">Créneau</label>
                <select id="slot_id" class="form-select"></select>
            </div>

            <div class="mb-3" style="max-width: 200px;">
                <label class="form-label">Disponibilité</label>
                <select id="availability" class="form-select">
                    <option value="disponible">✅ Disponible</option>
                    <option value="indisponible">❌ Indisponible</option>
                </select>
            </div>

            <div class="d-grid" style="max-width: 200px;">
                <button type="submit" id="submitBtn" class="btn btn-primary btn-lg">
                    <span id="btnText">Valider</span>
                    <span id="btnLoader" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                </button>
            </div>

        </form>

        <div id="result" class="mt-3 text-center fw-bold"></div>
    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
