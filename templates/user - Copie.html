<!DOCTYPE html>
<html>
<head>
    <title>Disponibilité Ping</title>

    <!-- IMPORTANT pour mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #404a53 !important;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card shadow p-4 w-100" style="max-width: 420px;">
        <h2 class="text-center mb-4">🏓 Disponibilité Championnat</h2>

        <form id="form">

            <div class="mb-3 mx-auto" style="max-width: 100px;">
                <label class="form-label">N° de licence</label>
                <input type="text" id="license" class="form-control" required>
            </div>

            <div id="player_name" class="mb-2 fw-bold text-center"></div>
            <div id="player_info" class="mb-3 fw-bold text-center"></div>

            <div class="row g-2 mb-3">
                <div class="col-6" style="max-width: 130px";>
                    <label>Journée</label>
                    <select id="match_day_id" class="form-select"></select>
                </div>

                <div class="col-6" style="max-width: 130px";>
                    <label>Date</label>
                    <div id="match_day_date" class="form-control bg-light"></div>
                </div>
            </div>

            <div class="mb-3" style="max-width: 200px";>
                <label class="form-label">Créneau</label>
                <select id="slot_id" class="form-select"></select>
            </div>

            <div class="mb-3" style="max-width: 170px";>
                <label class="form-label">Disponibilité</label>
                <select id="availability" class="form-select">
                    <option value="disponible">✅ Disponible</option>
                    <option value="indisponible">❌ Indisponible</option>
                </select>
            </div>

            <div class="text-center
            ">
                <button type="submit" id="submitBtn" class="btn btn-primary btn-lg">
                    <span id="btnText">Valider</span>
                    <span id="btnLoader" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                </button>
            </div>

        </form>

        <div id="result" class="mt-3 text-center fw-bold"></div>
    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
