<!DOCTYPE html>
<html>
<head>
    <title>Admin Disponibilités</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body {
        background: #eef2f7;
    }

    /* Carte principale */
    .card-custom {
        border-radius: 16px;
        border: none;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    /* Titre */
    .title-club {
        color: #1e3a8a; /* bleu foncé */
        font-weight: bold;
    }

    /* Select */
    .form-select {
        border-radius: 10px;
    }

    /* Tableau */
    .table thead {
        background-color: #1e3a8a;
        color: white;
    }

    /* Badge classement */
    .badge-ranking {
        background-color: #2563eb;
        font-size: 0.85rem;
    }

    /* Disponible */
    .badge-ok {
        background-color: #22c55e;
    }

    /* Indisponible */
    .badge-ko {
        background-color: #ef4444;
    }

    /* Hover ligne */
    .table-hover tbody tr:hover {
        background-color: #f1f5f9;
    }
</style>

<div class="text-center mb-2" style="font-size:12px; color:#156e59;">
    Tennis de Table Thuirinois
</div>

<body class="bg-light" style="background:#eef2f7 !important;">
    <div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4 p-4">
        <h3 class="text-center mb-4 title-club">
            🏓 Disponibilités joueurs
        </h3>
        <!-- Sélection journée -->
        <div class="mb-3">
            <label class="form-label">Journée</label>
            <select id="match_day_id" class="form-select shadow-sm"></select>
        </div>
        <!-- Tableau -->
        <div class="table-responsive">
            <table class="table table-hover table-bordered text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>👤 Nom</th>
                        <th>🏆 Classement</th>
                        <th>📅 Créneau</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- JS -->
<script src="/static/admin.js"></script>

</body>
</html>
